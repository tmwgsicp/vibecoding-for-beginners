name: 构建检查

on:
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.vitepress/**'
      - 'package.json'

jobs:
  build-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      
      - name: 构建测试
        run: pnpm docs:build
      
      - name: 检查构建产物
        run: |
          if [ -d "docs/.vitepress/dist" ]; then
            echo "✅ 构建成功"
            ls -lh docs/.vitepress/dist
          else
            echo "❌ 构建失败"
            exit 1
          fi
